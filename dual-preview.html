<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drop N Launch Dual Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 16px;
        background: #101412;
        color: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: minmax(560px, 1fr) 390px;
        gap: 16px;
        align-items: start;
      }

      .preview {
        min-width: 0;
      }

      .preview-label {
        margin: 0 0 8px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 0.78rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      iframe {
        width: 100%;
        height: calc(100vh - 56px);
        display: block;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: #ffffff;
      }

      .mobile iframe {
        width: 390px;
        max-width: 100%;
      }

      @media (max-width: 980px) {
        .preview-grid {
          grid-template-columns: 1fr;
        }

        .mobile iframe {
          width: 390px;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-grid">
      <section class="preview desktop" aria-label="Desktop preview">
        <p class="preview-label">Desktop</p>
        <iframe src="./index.html" title="Desktop preview"></iframe>
      </section>

      <section class="preview mobile" aria-label="Mobile preview">
        <p class="preview-label">Mobile 390px</p>
        <iframe src="./index.html" title="Mobile preview"></iframe>
      </section>
    </main>
  </body>
</html>
