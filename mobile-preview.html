<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drop N Launch Mobile Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 24px;
        background: #101412;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .phone {
        width: 390px;
        max-width: 100%;
        height: min(844px, calc(100vh - 48px));
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: #050706;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      }

      iframe {
        width: 390px;
        max-width: 100%;
        height: 100%;
        display: block;
        border: 0;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="390 pixel mobile preview">
      <iframe src="./index.html" title="Drop N Launch mobile preview"></iframe>
    </div>
  </body>
</html>
